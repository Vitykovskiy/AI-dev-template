name: Task
description: Create one issue-driven workflow task with explicit owner and dependencies.
title: "[Task] "
labels:
  - "type: task"
body:
  - type: dropdown
    id: task_type
    attributes:
      label: Task type
      description: Which operating-model task does this issue represent?
      options:
        - business_analysis
        - system_analysis
        - design
        - implementation
        - deploy
        - e2e
    validations:
      required: true
  - type: dropdown
    id: owner_contour
    attributes:
      label: Owner contour
      description: Which single contour owns execution of this task?
      options:
        - business-analyst
        - system-analyst
        - designer
        - frontend
        - backend
        - devops
        - qa-e2e
    validations:
      required: true
  - type: input
    id: parent_initiative
    attributes:
      label: Parent initiative
      description: Which Epic or initiative issue owns this task?
      placeholder: "#123"
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What specific outcome should exist when this task is done?
      placeholder: Describe the task outcome.
    validations:
      required: true
  - type: textarea
    id: canonical_inputs
    attributes:
      label: Canonical inputs
      description: Which repository artifacts or upstream tasks are required?
      placeholder: List docs, contracts, designs, or completed tasks.
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Which issues block this task from starting?
      placeholder: List issue IDs or write None.
    validations:
      required: true
  - type: textarea
    id: definition_of_ready
    attributes:
      label: Definition of ready
      description: What must be true before the owner contour may start?
      placeholder: List the preconditions for starting.
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of done
      description: What evidence is required before this issue may be closed?
      placeholder: List measurable completion conditions.
    validations:
      required: true
