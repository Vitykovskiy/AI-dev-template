name: Epic
description: Create a large outcome that will be decomposed into smaller issues.
title: "[Epic] "
labels:
  - "type: epic"
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What outcome should exist when this Epic is done?
      placeholder: Describe the strategic outcome.
    validations:
      required: true
  - type: textarea
    id: business_value
    attributes:
      label: Business value
      description: Why does this Epic matter?
      placeholder: Describe the business value.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included and excluded?
      placeholder: List what belongs to this Epic.
    validations:
      required: true
  - type: textarea
    id: completion_criteria
    attributes:
      label: Completion criteria
      description: What must be true to close the Epic?
      placeholder: List measurable completion criteria.
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Which internal or external dependencies affect this Epic?
      placeholder: List dependencies or write None.
    validations:
      required: false
  - type: textarea
    id: risks
    attributes:
      label: Risks
      description: What delivery or business risks should be tracked?
      placeholder: List known risks.
    validations:
      required: false
