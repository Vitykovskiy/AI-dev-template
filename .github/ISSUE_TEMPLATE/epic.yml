name: Epic
description: Create a top-level initiative that will be decomposed into issue-driven workflow tasks.
title: "[Epic] "
labels:
  - "type: epic"
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What outcome should exist when this initiative is done?
      placeholder: Describe the strategic outcome.
    validations:
      required: true
  - type: textarea
    id: business_value
    attributes:
      label: Business value
      description: Why does this initiative matter?
      placeholder: Describe the business value.
    validations:
      required: true
  - type: textarea
    id: required_task_chain
    attributes:
      label: Required task chain
      description: Which business analysis, system analysis, design, implementation, deploy, and e2e tasks are expected?
      placeholder: List the planned child task types and any known contour splits.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included and excluded?
      placeholder: List what belongs to this initiative.
    validations:
      required: true
  - type: textarea
    id: completion_criteria
    attributes:
      label: Completion criteria
      description: What must be true to close the initiative?
      placeholder: List measurable completion criteria, including deploy and e2e expectations.
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Which internal or external dependencies affect this initiative?
      placeholder: List dependencies or write None.
    validations:
      required: false
  - type: textarea
    id: risks
    attributes:
      label: Risks
      description: What delivery or business risks should be tracked?
      placeholder: List known risks.
    validations:
      required: false
