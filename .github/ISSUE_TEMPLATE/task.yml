name: Task
description: Create an atomic delivery task.
title: "[Task] "
labels:
  - "type: task"
body:
  - type: textarea
    id: what_to_do
    attributes:
      label: What to do
      description: What specific work must be performed?
      placeholder: Describe the task.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why
      description: Why is this task needed?
      placeholder: Describe why the task matters.
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Expected result
      description: What should exist when the task is done?
      placeholder: Describe the expected result.
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Which dependencies or preceding tasks exist?
      placeholder: List dependencies or write None.
    validations:
      required: false
  - type: textarea
    id: completion_criteria
    attributes:
      label: Completion criteria
      description: Which conditions must be met before closing the task?
      placeholder: List completion criteria.
    validations:
      required: true
